<div class="table-container">
  <table class="blocked-users-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Blocked At</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (user of users; track user._id) {
        <tr>
          <td>
            <div class="user-info">
              <span class="user-name">{{ user.name }}</span>
            </div>
          </td>
          <td>{{ user.email }}</td>
          <td>
            <span class="role-badge" [class]="user.role">{{ user.role }}</span>
          </td>
          <td>{{ formatDate(user.blockedAt) }}</td>
          <td>
            <div class="action-buttons">
              <button class="btn-view" (click)="onViewUser(user._id)">
                <i class="fa-solid fa-eye"></i>
                View
              </button>
              <button class="btn-unblock" (click)="onUnblockUser(user._id)">
                <i class="fa-solid fa-lock-open"></i>
                Unblock
              </button>
            </div>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="4" class="empty-state">
            <div class="empty-content">
              <i class="fa-solid fa-shield-halved"></i>
              <h3>No Blocked Users Found</h3>
              <p>There are currently no blocked users matching your criteria.</p>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
  
  @if (loading) {
    <div class="loader-container">
      <div class="spinner"></div>
      <p>Loading blocked users...</p>
    </div>
  }
</div>
