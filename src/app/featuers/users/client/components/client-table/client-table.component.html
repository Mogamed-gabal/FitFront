<div class="table-card">
  <div class="table-responsive">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (client of clients; track client.id) {
          <tr>
            <td>{{ client.name }}</td>
            <td>{{ client.email }}</td>
            <td>
              <span class="status-badge" [class]="client.status.toLowerCase()">{{ client.status }}</span>
            </td>
            <td>
              <div class="action-buttons">
                <button type="button" class="view-btn" (click)="onView(client)">
                  <i class="fa-solid fa-eye"></i>
                  <span>View</span>
                </button>
                
                @if (client.status === 'Active') {
                  <button type="button" class="block-btn" (click)="onBlockClient(client)">
                    <i class="fa-solid fa-ban"></i>
                    <span>Block</span>
                  </button>
                } @else {
                  <button type="button" class="unblock-btn" (click)="onUnblockClient(client)">
                    <i class="fa-solid fa-check"></i>
                    <span>Unblock</span>
                  </button>
                }
                
                <button type="button" class="delete-btn" (click)="onDeleteClient(client)">
                  <i class="fa-solid fa-trash"></i>
                  <span>Delete</span>
                </button>
              </div>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="4" class="empty-state">No clients found.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
