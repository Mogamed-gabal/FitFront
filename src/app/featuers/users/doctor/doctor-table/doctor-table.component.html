<div class="table-card">
  <div class="table-responsive">
    <table class="doctor-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Specialization</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (doctor of doctors; track doctor.id) {
          <tr>
            <td>{{ doctor.name }}</td>
            <td>{{ doctor.email }}</td>
            <td>{{ doctor.phone }}</td>
            <td>{{ doctor.specialization }}</td>
            <td>
              <span class="status-badge" [class]="doctor.status.toLowerCase()">{{ doctor.status }}</span>
            </td>
            <td>
              <div class="action-buttons">
                <button class="btn-view" (click)="onView(doctor)">
                  <i class="fa-solid fa-eye"></i>
                  View
                </button>
                @if (doctor.isBlocked) {
                  <button class="btn-unblock" (click)="onUnblock(doctor)">
                    <i class="fa-solid fa-unlock"></i>
                    Unblock
                  </button>
                } @else {
                  <button class="btn-block" (click)="onBlock(doctor)">
                    <i class="fa-solid fa-ban"></i>
                    Block
                  </button>
                }
                <button class="btn-delete" (click)="onDelete(doctor)">
                  <i class="fa-solid fa-trash"></i>
                  Delete
                </button>
              </div>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="6" class="empty-state">No doctors found.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
