@if (user) {
  <div class="modal-overlay" (click)="onCloseModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <!-- Modal Header with Gradient -->
      <div class="modal-header">
        <div class="header-info">
          <div class="user-avatar">
            <div class="avatar-gradient">
              <i class="fa-solid fa-user-slash"></i>
            </div>
            <div class="status-indicator blocked"></div>
          </div>
          <div class="user-info">
            <h3>{{ user.name }}</h3>
            <span class="user-role" [class]="user.role">{{ user.role }}</span>
          </div>
        </div>
        <button class="close-btn" (click)="onCloseModal()">
          <i class="fa-solid fa-times"></i>
        </button>
      </div>
      
      <!-- Modal Body with Enhanced Layout -->
      <div class="modal-body">
        <!-- Contact Information Section -->
        <div class="info-section">
          <div class="section-header">
            <div class="section-icon">
              <i class="fa-solid fa-address-card"></i>
            </div>
            <h4>Contact Information</h4>
          </div>
          <div class="info-grid">
            <div class="info-item">
              <div class="info-label">
                <i class="fa-solid fa-envelope"></i>
                Email
              </div>
              <div class="info-value">
                <p>{{ user.email }}</p>
                <span class="copy-btn" (click)="copyToClipboard(user.email)">
                  <i class="fa-solid fa-copy"></i>
                </span>
              </div>
            </div>
          </div>
        </div>

        <!-- Block Information Section -->
        <div class="info-section">
          <div class="section-header">
            <div class="section-icon">
              <i class="fa-solid fa-ban"></i>
            </div>
            <h4>Block Information</h4>
          </div>
          <div class="info-grid">
            <div class="info-item full-width">
              <div class="info-label">
                <i class="fa-solid fa-comment-dots"></i>
                Block Reason
              </div>
              <div class="info-value">
                <p class="reason-text">{{ user.blockReason }}</p>
              </div>
            </div>
            <div class="info-item">
              <div class="info-label">
                <i class="fa-solid fa-calendar-alt"></i>
                Blocked At
              </div>
              <div class="info-value">
                <p>{{ formatDate(user.blockedAt) }}</p>
              </div>
            </div>
            <div class="info-item">
              <div class="info-label">
                <i class="fa-solid fa-user-shield"></i>
                Blocked By
              </div>
              <div class="info-value">
                <p>{{ user.blockedBy }}</p>
              </div>
            </div>
          </div>
        </div>

        <!-- User Status Section -->
        <div class="info-section">
          <div class="section-header">
            <div class="section-icon">
              <i class="fa-solid fa-info-circle"></i>
            </div>
            <h4>Account Status</h4>
          </div>
          <div class="status-grid">
            <div class="status-item">
              <div class="status-label">Account Status</div>
              <div class="status-value blocked">
                <i class="fa-solid fa-lock"></i>
                Blocked
              </div>
            </div>
            <div class="status-item">
              <div class="status-label">User Type</div>
              <div class="status-value role" [class]="user.role">
                <i class="fa-solid fa-user-tag"></i>
                {{ user.role }}
              </div>
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-section">
          <!-- Unblock action handled by parent component -->
        </div>
      </div>
    </div>
  </div>
}
