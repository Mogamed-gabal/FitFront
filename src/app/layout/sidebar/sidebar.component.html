<aside
  class="sidebar"
  [class.collapsed]="collapsed"
  [class.mobile-open]="mobileOpen"
>
  <div class="brand">
    <div class="brand-icon">
      <i class="fa-solid fa-shield-halved"></i>
    </div>
    <div class="brand-text" *ngIf="!collapsed">
      <h2>Admin Panel</h2>
      <span>Control Center</span>
    </div>
  </div>

  <nav class="menu">
    <a
      *ngFor="let item of menuItems"
      class="menu-link"
      [routerLink]="item.route"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="closeSidebarOnMobile()"
    >
      <i [class]="item.icon"></i>
      <span *ngIf="!collapsed">{{ item.label }}</span>
    </a>
  </nav>

  <!-- Mobile-only action buttons -->
  <div class="sidebar-actions mobile-only">
    <button class="action-btn" type="button" (click)="toggleDarkMode()">
      <i class="fa-solid" [class.fa-moon]="!isDarkMode" [class.fa-sun]="isDarkMode"></i>
      <span>Dark Mode</span>
    </button>
    <button class="action-btn" type="button" (click)="onNavigateToSettings()">
      <i class="fa-solid fa-gear"></i>
      <span>Settings</span>
    </button>
    <button class="action-btn logout" type="button" (click)="onLogout()">
      <i class="fa-solid fa-right-from-bracket"></i>
      <span>Logout</span>
    </button>
  </div>
</aside>
